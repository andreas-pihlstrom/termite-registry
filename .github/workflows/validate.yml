name: validate
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Validate registry (schema + shader compile + theme parse)
        run: python3 tools/validate.py
      - name: Test first-party Channel connectors offline
        run: python3 tools/test-channels.py
      - name: Integrate first-party Channels against loopback probes
        run: python3 tools/test-channel-integrations.py
